<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
      padding: 20px;
      color: #333;
    }
    h1 {
      font-size: 18px;
      text-align: center;
      color: #0277bd;
      margin-bottom: 16px;
    }
    .cup-visual {
      width: 80px;
      height: 100px;
      margin: 0 auto 12px;
      position: relative;
    }
    .cup-body {
      width: 80px;
      height: 92px;
      background: rgba(255,255,255,0.7);
      border: 3px solid #4fc3f7;
      border-radius: 0 0 20px 20px;
      overflow: hidden;
      position: relative;
    }
    .cup-water {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(180deg, #4fc3f7, #0288d1);
      transition: height 0.5s ease;
      border-radius: 0 0 17px 17px;
    }
    .cup-handle {
      position: absolute;
      right: -16px; top: 22px;
      width: 16px; height: 32px;
      border: 3px solid #4fc3f7;
      border-left: none;
      border-radius: 0 10px 10px 0;
    }
    .stats {
      text-align: center;
      margin-bottom: 16px;
    }
    .stats .amount {
      font-size: 28px;
      font-weight: 700;
      color: #0288d1;
    }
    .stats .goal {
      font-size: 13px;
      color: #666;
    }
    .stats .cups {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }
    .drink-btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #4fc3f7, #0288d1);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(2, 136, 209, 0.3);
    }
    .drink-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(2, 136, 209, 0.4);
    }
    .drink-btn:active { transform: scale(0.97); }

    .settings {
      margin-top: 16px;
      border-top: 1px solid rgba(0,0,0,0.1);
      padding-top: 12px;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .setting-row label { color: #555; }
    .setting-row input, .setting-row select {
      width: 80px;
      padding: 4px 8px;
      border: 1px solid #b2ebf2;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      background: #fff;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      color: #555;
    }
    .switch {
      position: relative;
      width: 42px; height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border-radius: 24px;
      transition: 0.3s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }
    .switch input:checked + .slider { background: #4fc3f7; }
    .switch input:checked + .slider::before { transform: translateX(18px); }
  </style>
</head>
<body>
  <h1>💧 喝水提醒</h1>

  <div class="cup-visual">
    <div class="cup-body">
      <div class="cup-water" id="cupWater" style="height: 0%"></div>
    </div>
    <div class="cup-handle"></div>
  </div>

  <div class="stats">
    <div class="amount"><span id="todayMl">0</span> ml</div>
    <div class="goal">目標 <span id="dailyGoal">2000</span> ml</div>
    <div class="cups">今日已喝 <span id="todayCups">0</span> 杯</div>
  </div>

  <button class="drink-btn" id="drinkBtn">喝了一杯 💧</button>

  <div class="settings">
    <div class="setting-row">
      <label>提醒間隔</label>
      <select id="intervalMin">
        <option value="15">15 分鐘</option>
        <option value="20">20 分鐘</option>
        <option value="30" selected>30 分鐘</option>
        <option value="45">45 分鐘</option>
        <option value="60">60 分鐘</option>
      </select>
    </div>
    <div class="setting-row">
      <label>每杯容量 (ml)</label>
      <input type="number" id="cupMl" value="250" min="50" max="1000" step="50">
    </div>
    <div class="setting-row">
      <label>每日目標 (ml)</label>
      <input type="number" id="goalMl" value="2000" min="500" max="5000" step="100">
    </div>
    <div class="toggle-row">
      <label>啟用提醒</label>
      <label class="switch">
        <input type="checkbox" id="enabledToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
