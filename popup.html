<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
      padding: 20px;
      color: #333;
    }
    h1 {
      font-size: 18px;
      text-align: center;
      color: #0277bd;
      margin-bottom: 16px;
    }

    /* 今日統計 */
    .stats {
      text-align: center;
      margin-bottom: 16px;
      padding: 12px;
      background: rgba(255,255,255,0.6);
      border-radius: 12px;
    }
    .stats .amount {
      font-size: 28px;
      font-weight: 700;
      color: #0288d1;
    }
    .stats .sub {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }
    /* 每日目標進度條 */
    .goal-progress {
      margin-top: 8px;
      background: rgba(0,0,0,0.06);
      border-radius: 6px;
      height: 10px;
      overflow: hidden;
    }
    .goal-progress-bar {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #4fc3f7, #0288d1);
      transition: width 0.4s ease;
      min-width: 0;
    }
    .goal-label {
      font-size: 11px;
      color: #888;
      margin-top: 3px;
    }

    /* 每週回顧 */
    .weekly {
      margin-bottom: 14px;
      padding: 12px;
      background: rgba(255,255,255,0.6);
      border-radius: 12px;
    }
    .weekly h2 {
      font-size: 13px;
      font-weight: 600;
      color: #0277bd;
      margin-bottom: 10px;
    }
    .chart {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      height: 80px;
      gap: 4px;
    }
    .chart-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .chart-bar-wrap {
      width: 100%;
      height: 60px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .chart-bar {
      width: 100%;
      max-width: 24px;
      border-radius: 4px 4px 0 0;
      min-height: 2px;
      transition: height 0.4s ease;
    }
    .chart-bar.reached { background: linear-gradient(180deg, #4fc3f7, #0288d1); }
    .chart-bar.missed { background: linear-gradient(180deg, #ffcc80, #ff9800); }
    .chart-day {
      font-size: 10px;
      color: #888;
    }
    .chart-ml {
      font-size: 9px;
      color: #666;
      min-height: 12px;
    }

    /* 設定 */
    .settings {
      border-top: 1px solid rgba(0,0,0,0.1);
      padding-top: 12px;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 13px;
    }
    .setting-row label { color: #555; }
    .setting-row select, .setting-row input[type="number"] {
      padding: 4px 8px;
      border: 1px solid #b2ebf2;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
    }
    .setting-row input[type="number"] {
      width: 70px;
      text-align: center;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      color: #555;
    }
    .switch {
      position: relative;
      width: 42px; height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border-radius: 24px;
      transition: 0.3s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }
    .switch input:checked + .slider { background: #4fc3f7; }
    .switch input:checked + .slider::before { transform: translateX(18px); }
    .test-btn {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 8px;
      background: #ff8f00;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .test-btn:hover { background: #ff6f00; }
    .data-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .data-btn {
      flex: 1;
      padding: 7px;
      border: 1px solid #b2ebf2;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: #0288d1;
    }
    .data-btn:hover { background: #e0f7fa; }
    .data-btn.danger { color: #d32f2f; border-color: #ffcdd2; }
    .data-btn.danger:hover { background: #ffebee; }
    .info {
      margin-top: 12px;
      font-size: 11px;
      color: #999;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>💧 喝水提醒</h1>

  <div class="stats">
    <div class="amount"><span id="todayMl">0</span> ml</div>
    <div class="sub">今日已喝 <span id="todayCups">0</span> 次</div>
    <div class="goal-progress">
      <div class="goal-progress-bar" id="goalBar" style="width:0%"></div>
    </div>
    <div class="goal-label">目標 <span id="goalLabel">2000</span> ml（<span id="goalPct">0</span>%）</div>
  </div>

  <div class="weekly">
    <h2>📊 過去 7 天</h2>
    <div class="chart" id="weeklyChart"></div>
  </div>

  <div class="settings">
    <div class="setting-row">
      <label>提醒間隔</label>
      <select id="intervalMin">
        <option value="0.5">30 秒（測試）</option>
        <option value="1" selected>1 分鐘（測試）</option>
        <option value="30">30 分鐘</option>
        <option value="60">60 分鐘</option>
      </select>
    </div>
    <div class="setting-row">
      <label>每日目標 (ml)</label>
      <input type="number" id="dailyGoal" value="2000" min="500" max="5000" step="100">
    </div>
    <div class="toggle-row">
      <label>啟用提醒</label>
      <label class="switch">
        <input type="checkbox" id="enabledToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <button class="test-btn" id="testBtn">立即測試提醒</button>

  <div class="data-actions">
    <button class="data-btn" id="exportBtn">匯出資料</button>
    <button class="data-btn danger" id="resetBtn">重置紀錄</button>
  </div>

  <div class="info">
    時間到 → 游標變黃 + 空杯搖晃<br>
    長按杯子 3 秒 = 喝完 300ml 🥤
  </div>

  <script src="popup.js"></script>
</body>
</html>
