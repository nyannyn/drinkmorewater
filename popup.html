<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
      padding: 20px;
      color: #333;
    }
    h1 {
      font-size: 18px;
      text-align: center;
      color: #0277bd;
      margin-bottom: 16px;
    }
    .stats {
      text-align: center;
      margin-bottom: 16px;
      padding: 12px;
      background: rgba(255,255,255,0.6);
      border-radius: 12px;
    }
    .stats .amount {
      font-size: 28px;
      font-weight: 700;
      color: #0288d1;
    }
    .stats .sub {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }
    .settings {
      border-top: 1px solid rgba(0,0,0,0.1);
      padding-top: 12px;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 13px;
    }
    .setting-row label { color: #555; }
    .setting-row select {
      padding: 4px 8px;
      border: 1px solid #b2ebf2;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      color: #555;
    }
    .switch {
      position: relative;
      width: 42px; height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border-radius: 24px;
      transition: 0.3s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }
    .switch input:checked + .slider { background: #4fc3f7; }
    .switch input:checked + .slider::before { transform: translateX(18px); }
    .test-btn {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 8px;
      background: #ff8f00;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .test-btn:hover { background: #ff6f00; }
    .info {
      margin-top: 12px;
      font-size: 11px;
      color: #999;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>💧 喝水提醒</h1>

  <div class="stats">
    <div class="amount"><span id="todayMl">0</span> ml</div>
    <div class="sub">今日已喝 <span id="todayCups">0</span> 次（每次 300ml）</div>
  </div>

  <div class="settings">
    <div class="setting-row">
      <label>提醒間隔</label>
      <select id="intervalMin">
        <option value="0.5">30 秒（測試）</option>
        <option value="1" selected>1 分鐘（測試）</option>
        <option value="30">30 分鐘</option>
        <option value="60">60 分鐘</option>
      </select>
    </div>
    <div class="toggle-row">
      <label>啟用提醒</label>
      <label class="switch">
        <input type="checkbox" id="enabledToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <button class="test-btn" id="testBtn">立即測試提醒</button>

  <div class="info">
    時間到 → 游標變黃 + 空杯搖晃<br>
    長按杯子 3 秒 = 喝完 300ml 🥤
  </div>

  <script src="popup.js"></script>
</body>
</html>
